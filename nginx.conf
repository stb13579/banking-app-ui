server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable caching for the entry point so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
